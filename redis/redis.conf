# Redis Production Configuration

# Bind to all interfaces (in Docker context)
bind 0.0.0.0

# Security
protected-mode yes

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
